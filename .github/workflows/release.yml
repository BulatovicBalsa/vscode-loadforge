name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${{ steps.version.outputs.package_version }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${{ steps.version.outputs.package_version }}."
            exit 1
          fi

      - name: Lint sources
        run: npm run lint

      - name: Package extension
        run: npm run package:vsix

      - name: Generate checksum
        run: sha256sum "loadforge-${{ steps.version.outputs.package_version }}.vsix" > "loadforge-${{ steps.version.outputs.package_version }}.vsix.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: LoadForge v${{ steps.version.outputs.package_version }}
          generate_release_notes: true
          files: |
            loadforge-${{ steps.version.outputs.package_version }}.vsix
            loadforge-${{ steps.version.outputs.package_version }}.vsix.sha256
